[package]
name = "kglite-mcp-server"
version = "0.0.1"
edition = "2021"
authors = ["Kristian dF Kollsgård <kkollsg@gmail.com>"]
license = "MIT"
description = "MCP server for kglite knowledge graphs — single-binary Rust frontend for cypher_query / graph_overview / save_graph plus the generic source / GitHub / python-tool surface from mcp-methods."

[[bin]]
name = "kglite-mcp-server"
path = "src/main.rs"

[dependencies]
# Generic MCP server framework (rmcp + manifest + source/github/python tools).
# Git dep on kkollsga/mcp-methods — the framework crate lives at
# `crates/mcp-server/` inside that workspace. The crate name `mcp-server`
# is taken on crates.io by the official Anthropic SDK, so we ship via git
# until the framework is published under a different name. Pinned by rev
# for reproducibility; bump in lockstep with mcp-methods releases.
mcp-server = { git = "https://github.com/kkollsga/mcp-methods.git", rev = "e45a28284448a871677ce6ac581270399421712e" }

# Same kglite crate the Python wheel builds from. We want it as an rlib
# (pure Rust API), no PyO3 extension features.
kglite = { path = "../..", default-features = false }

# rmcp re-export for the dynamic tool registration path.
rmcp = { version = "1.6", features = ["server", "macros", "transport-io", "schemars"] }

# Async runtime + JSON
tokio = { version = "1", features = ["macros", "rt-multi-thread", "io-std", "fs", "sync", "time"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
schemars = "1"

# Error handling + CLI
anyhow = "1"
clap = { version = "4", features = ["derive"] }

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Python embedding for cypher_query / graph_overview / save_graph dispatch.
# kglite's public API is Python (PyO3 wrappers around Rust internals); this
# binary calls those wrappers directly through the embedded interpreter.
pyo3 = { version = "0.28", features = ["auto-initialize"] }
