name: Benchmarks

# Manual-trigger only. Run via the "Actions" tab → "Benchmarks" → "Run
# workflow", or from the CLI: `gh workflow run benchmarks.yml`.
#
# Previously ran on every push to main, which cascaded into a gh-pages
# commit + Pages rebuild on every merge (~4 extra runner clones per
# push). Separating the job isolates the cost to deliberate runs.
on:
  workflow_dispatch:

jobs:
  python-benchmarks:
    name: Benchmarks
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Cache cargo registry & target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-bench-

      - name: Install dependencies
        run: pip install maturin pytest pytest-benchmark pandas

      - name: Build and install extension
        run: pip install -e .

      - name: Run tracked benchmarks
        run: pytest tests/benchmarks/test_bench_core.py -m benchmark --benchmark-json=benchmark-results.json

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: 'pytest'
          output-file-path: benchmark-results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: '150%'
          comment-on-alert: true
          fail-on-alert: false
