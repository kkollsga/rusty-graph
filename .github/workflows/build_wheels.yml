name: Build and Publish Python Wheels
on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - 'docs/**'
  workflow_dispatch: # Allow manual triggering

jobs:
  version-check:
    name: Check if version needs publishing
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.check.outputs.should_publish }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - name: Check version against PyPI
        id: check
        run: |
          VERSION=$(grep -m 1 "version" Cargo.toml | cut -d '"' -f 2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Cargo.toml version: $VERSION"

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/kglite/$VERSION/json")
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "Version $VERSION already exists on PyPI — skipping build"
            echo "should_publish=false" >> $GITHUB_OUTPUT
          else
            echo "Version $VERSION not on PyPI — will build and publish"
            echo "should_publish=true" >> $GITHUB_OUTPUT
          fi

  ci-gate:
    name: Wait for CI to pass
    needs: [version-check]
    if: needs.version-check.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Wait for CI workflow
        uses: lewagon/wait-on-check-action@v1.7.0
        with:
          ref: ${{ github.sha }}
          check-name: 'Rust checks'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 15
      - name: Wait for Python tests (3.10)
        uses: lewagon/wait-on-check-action@v1.7.0
        with:
          ref: ${{ github.sha }}
          check-name: 'Python tests (py3.10)'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 15
      - name: Wait for Python tests (3.12)
        uses: lewagon/wait-on-check-action@v1.7.0
        with:
          ref: ${{ github.sha }}
          check-name: 'Python tests (py3.12)'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 15
      - name: Wait for Python lint
        uses: lewagon/wait-on-check-action@v1.7.0
        with:
          ref: ${{ github.sha }}
          check-name: 'Python lint'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 15

  build:
    name: Build wheel - ${{ matrix.os }} - ${{ matrix.target }}
    needs: [ci-gate, version-check]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    # 0.9.20: the bundled binary was retired in favour of a Python
    # entry point (kglite.mcp_server.server:main). With no binary in
    # the wheel, there's nothing forcing a per-Python-version build —
    # the kglite cdylib uses pyo3's abi3-py310 feature and the same
    # `.so` serves all Python 3.10+. Matrix collapses back to 3 cells
    # (one per OS). See `docs/guides/mcp-servers.md` for the
    # architectural rationale.
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Python 3.10 (abi3 floor)
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          # 0.9.22: bump cache key to nuke stale 0.9.18/0.9.19 entries
          # (those builds had fastembed-rs + ort + tokenizers in the
          # binary's link graph; the new entries are smaller and
          # incompatible). The deserialization warning that's appeared
          # since the architecture shift is harmless but noisy — a
          # fresh key suppresses it cleanly.
          shared-key: "wheel-${{ matrix.target }}-0922"
      - name: Install Maturin
        run: pip install maturin
      - name: Build abi3 wheel
        run: |
          if (!(Test-Path -Path "wheels")) { New-Item -ItemType Directory -Path "wheels" }
          maturin build --release --target ${{ matrix.target }} --out wheels
        shell: pwsh
      - name: List build directory
        run: Get-ChildItem -Recurse wheels
        shell: pwsh
      - name: Upload wheels as artifact
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: wheels/*.whl

  publish:
    name: Publish to PyPI
    needs: [version-check, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write  # Required for Trusted Publishing
    steps:
      - uses: actions/checkout@v6
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - name: Display structure of downloaded files
        run: find dist -type f
      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ needs.version-check.outputs.version }}"
          # Extract the section between "## [VERSION]" and the next "## [" heading
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            echo "No changelog entry found for $VERSION, using auto-generated notes"
            echo "has_notes=false" >> $GITHUB_OUTPUT
          else
            echo "has_notes=true" >> $GITHUB_OUTPUT
            echo "$NOTES" > /tmp/release_notes.md
          fi
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
          password: ${{ secrets.PYPI_API_TOKEN }}
      - name: Create GitHub Release (with changelog)
        if: steps.changelog.outputs.has_notes == 'true'
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*.whl
          body_path: /tmp/release_notes.md
          tag_name: v${{ needs.version-check.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create GitHub Release (auto-generated)
        if: steps.changelog.outputs.has_notes != 'true'
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*.whl
          generate_release_notes: true
          tag_name: v${{ needs.version-check.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
