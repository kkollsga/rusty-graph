# Example manifest for kglite-mcp-server in workspace mode — adapt and deploy.
#
# This is a github-clone-tracker workspace: the agent calls
# repo_management('org/repo') to clone a repo into the workspace, kglite
# builds its code-tree graph, and queries flow against that active repo
# until you swap it.
#
# Two supported layouts (since kglite 0.9.29 / mcp-methods 0.3.33):
#
# Layout A — manifest inside the workspace dir (the simple case):
#
#     mkdir /path/to/my-workspace/
#     cp examples/open_source_workspace_mcp.yaml \
#        /path/to/my-workspace/workspace_mcp.yaml
#     kglite-mcp-server --workspace /path/to/my-workspace/
#
# Layout B — manifest beside the workspace dir (the natural shape when
# you want `repos/` as a dedicated clone sandbox):
#
#     mkdir -p /path/to/open_source/repos/
#     cp examples/open_source_workspace_mcp.yaml \
#        /path/to/open_source/workspace_mcp.yaml
#     kglite-mcp-server --workspace /path/to/open_source/repos/
#
# For layout B the `workspace.applies_to:` declaration below is what
# tells the framework "this manifest covers any child directory of my
# parent dir." Without that declaration the parent-walk discovery is
# refused (the safety property — prevents silent-wrong-manifest if
# you point --workspace at any unrelated sibling).
#
# The filename MUST be `workspace_mcp.yaml` — the CLI auto-detects
# manifests by that name. All paths resolve relative to the manifest.
#
# This shape is the open-source-explorer pattern: one workspace dir,
# multiple repos cloned over time, idle repos auto-sweep after
# `--stale-after-days` (default 7). For local-workspace (single fixed
# directory + watch rebuild) see docs/examples/manifest_workspace.md.

name: Open Source Explorer

# Opt-in skills surface (0.9.31 / mcp-methods 0.3.36+). When set,
# the server exposes per-tool methodology via the MCP `prompts/`
# namespace — agents can call `prompts/get cypher_query` to load
# the bundled cypher_query.md skill (analogous for graph_overview,
# save_graph, read_code_source). The four kglite-bundled skills
# layer with framework defaults (grep / read_source / list_source /
# github_issues / repo_management methodology) and any operator-
# authored project layer in `<basename>.skills/`.
#
# Values:
#   skills: true         — bundled defaults only (kglite + framework)
#   skills: ./my-skills/ — bundled defaults + a single operator path
#   skills:              — list form for layered operator packs
#     - true             — bundled defaults
#     - ./team-skills/   — shared layer
#     - ./this-deploy/   — per-deployment overrides (highest priority)
#
# Without `skills:`, prompts/list returns empty — no behavioural
# change from pre-0.9.31 deployments.
#
# read_code_source ships an `applies_when:` gate
# (graph_has_node_type: [Function, Class]) so it stays out of
# prompts/list on non-code graphs (legal, o&g). Agents in those
# deployments don't see the skill at all.
skills: true

# Opt-in declaration for parent-walk manifest discovery (0.9.29 /
# mcp-methods 0.3.33+). With this set, you can launch with
# `--workspace <parent>/repos/` and the framework finds this manifest
# one level up. Patterns are matched against the workspace dir's
# basename:
#   ./*        — any direct child (most permissive; use when the
#                parent dir holds one workspace sandbox)
#   ./repos    — literal "repos" only
#   ./prod-*   — children starting with "prod-"
#   [./repos, ./clones]   — list form, matches any entry
#
# Drop this field if your layout has the manifest INSIDE the workspace
# dir (layout A in the header comment). Without applies_to, the
# parent-walk discovery is refused — a deliberate safety property
# (prevents silent-wrong-manifest if you point --workspace at any
# unrelated sibling directory).
workspace:
  kind: github
  applies_to: ./*

# .env walk-up loads GITHUB_TOKEN (or GH_TOKEN) for github_issues +
# github_api. Without a token those tools don't register at boot.
env_file: ../.env

builtins:
  temp_cleanup: on_overview

# Localhost CSV server: `FORMAT CSV` in cypher_query writes to
# `<workspace>/temp/kglite-<hash>.csv` and returns a fetch URL the
# agent can stream from. Without this block, FORMAT CSV inlines the
# CSV in the response (subject to the MCP transport's size limits —
# fine for thousands of rows, painful for millions).
# 0.9.29: the localhost listener defaults to an OS-assigned port so
# multiple kglite-mcp-server processes launched concurrently (e.g. by
# Claude Desktop) don't collide. Set `port: 9000` here to override.
extensions:
  csv_http_server: true

instructions: |
  Code intelligence for open-source GitHub repositories via knowledge
  graphs.

  FIRST STEP: call repo_management('org/repo') to clone the repository
  and build its knowledge graph. Every other tool (cypher_query,
  graph_overview, read_code_source, etc.) requires an active repo —
  call them after repo_management has activated one.

overview_prefix: |
  ## Two read paths

  - `read_code_source(qualified_name='Type::method')` — collapses
    cypher-then-read into one call when you know the entity name.
    Returns the source slice plus a one-line header pinning
    file_path:line range.
  - `read_source(file_path='...')` — for files without graph nodes
    (configs, build scripts, docs).

  Cypher first to locate by predicate (callers of a function,
  importers of a module), pass the qualified_name to read_code_source.

# ── Bundled tool overrides ───────────────────────────────────────────
# kglite 0.9.27 / mcp-methods 0.3.31+: customise the agent-facing
# `description:` of any bundled tool inline. Three override types:
#
# - description: replaces what the agent sees in `tools/list`.
#   Useful for teaching tool-specific call patterns next to the tool
#   itself, instead of burying them in the global `instructions:`
#   block (which the agent reads once on initialize and can lose
#   track of as the session grows).
# - hidden: true — drop the tool from `tools/list` AND reject calls
#   to it. Use to narrow the agent surface when a bundled tool isn't
#   appropriate for your domain (e.g. hiding `ping` on a production
#   server, or suppressing source-file tools when --graph auto-binds
#   a source_root wider than you want exposed).
# - rename (0.9.30 / mcp-methods 0.3.34+): expose the bundled tool
#   under a different name. Useful for operators running multiple
#   kglite-mcp-servers (one per knowledge graph) where every server
#   exposes identical `cypher_query` / `read_code_source` surfaces —
#   ToolSearch results then show six near-identical matches across
#   three servers, ambiguous to rank. Renaming to
#   `<domain>_<bundled>` (e.g. `open_source_cypher_query`)
#   disambiguates the namespace. The canonical handler still runs;
#   only the agent-facing identifier changes.
#
# Unknown bundled tool names error at boot with the valid list, so
# typos are caught before runtime. Rename collisions (renaming to a
# name already used by another bundled tool, another rename, or a
# manifest-declared cypher tool) also error at boot.

tools:
  - bundled: repo_management
    description: |
      Manage cloned repositories. FIRST STEP before any other tool.

      Common invocations:
      - repo_management()                          — list cloned repos
      - repo_management('pydata/xarray')           — clone (if needed) + activate
      - repo_management(update=True)               — git fetch + rebuild if changed
      - repo_management(update=True, force_rebuild=True)
                                                   — rebuild graph regardless of SHA
      - repo_management('pydata/xarray', delete=True)
                                                   — remove repo + graph

      Idle repos auto-sweep after `--stale-after-days` (default 7).
      The active repo is exempt from sweeping.

  - bundled: cypher_query
    # rename: open_source_cypher_query   # uncomment when running >1 kglite server
    description: |
      Run a Cypher query against the active repo's knowledge graph.
      Returns up to 15 rows inline.

      Append `FORMAT CSV` to the query for a CSV-exported result
      served from a localhost URL (CORS-enabled). Use for
      million-row exports that would blow the MCP response budget.

  - bundled: read_source
    description: |
      Read a file slice from the active repo's clone path. Use
      `file_path` (relative to the active repo root), `start_line` /
      `end_line` to narrow, `grep` + `grep_context` to filter.

      Two read paths in this server:
      - read_source(file_path=...)         — for any file (configs,
                                             docs, build scripts).
      - read_code_source(qualified_name=...) — collapses cypher-then-
                                              read for entities the
                                              graph already indexed
                                              (functions, classes,
                                              methods). Prefer when
                                              you know the symbol.

  - bundled: grep
    description: |
      Recursive regex search across the active repo's source tree.
      .gitignore-aware. Returns `path:lineno:content` for matches
      (and `path-lineno-content` for context lines).

      Cypher is faster + more precise for locating functions /
      classes / call sites — reach for grep when you need plain-text
      search (string literals, config keys, comments).
